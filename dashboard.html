<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    const savedTheme = localStorage.getItem('fg_theme');
    document.documentElement.setAttribute(
      'data-theme',
      savedTheme || 'dark'
    );
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FakeGuard — Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="dashboard.css"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
   <div class="sidebar-brand">
  <div class="brand-left">
    <button onclick="toggleSidebar()" class="collapse-btn">☰</button>

    <div class="brand-icon">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" stroke="var(--accent)" stroke-width="2.5"/>
          <path d="M10 16.5l4 4 8-8" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">FakeGuard</span>
    </div>
</div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item active" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="analyze.html" class="nav-item" data-page="analyze">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>Analyze Profile</span>
      </a>
      <a href="history.html" class="nav-item" data-page="history">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span>History</span>
      </a>
      <a href="profile.html" class="nav-item" data-page="profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>My Profile</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <button class="theme-toggle" onclick="toggleTheme()">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span class="theme-label"></span>
      </button>
      <button class="signout-btn" onclick="signOut()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- Mobile Header -->
  <header class="mobile-header">
    
    <button class="hamburger" onclick="toggleSidebar()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="brand-name">FakeGuard</span>
    <button class="theme-toggle-mobile" onclick="toggleTheme()">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
        

      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-sub" id="welcome-msg">Welcome back!</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>
        <div>
          <div class="stat-val" id="stat-total">0</div>
          <div class="stat-label">Total Analyzed</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <div>
          <div class="stat-val" id="stat-fake">0</div>
          <div class="stat-label">Fake Detected</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div>
          <div class="stat-val" id="stat-real">0</div>
          <div class="stat-label">Real Confirmed</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div>
          <div class="stat-val" id="stat-accuracy">94.2%</div>
          <div class="stat-label">Model Accuracy</div>
        </div>
      </div>
    </div>

    <!-- Quick Analyze -->
    <div class="section-card">
      <h3 class="section-title">Quick Analyze</h3>
      <div class="quick-analyze-bar">
        <input type="text" id="quick-username" placeholder="Enter Instagram username..." class="field-input"/>
        <button class="btn-primary compact" onclick="window.location.href='analyze.html'">Analyze</button>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="section-card">
      <h3 class="section-title">Recent Analyses</h3>
      <div class="recent-list" id="recent-list">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <p>No analyses yet. Start by analyzing a profile.</p>
          <a href="analyze.html" class="btn-primary compact">Analyze Now</a>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    loadDashboard();
  </script>
</body>
</html>

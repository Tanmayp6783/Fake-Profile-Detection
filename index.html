<!DOCTYPE html>
<html>
<head>
  <title>Instagram Fake Profile Detector</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="page">

  <h1>Instagram Fake Profile Detector</h1>
  <p class="subtitle">AI-based Instagram authenticity checker</p>

  <div class="card">

    <div class="form-group">
      <label>Username</label>
      <input id="username" placeholder="Enter username">
    </div>

    <div class="grid">
      <div class="form-group">
        <label>Followers</label>
        <input id="followers" type="number">
      </div>
      <div class="form-group">
        <label>Following</label>
        <input id="following" type="number">
      </div>
    </div>

    <div class="grid">
      <div class="form-group">
        <label>Posts</label>
        <input id="posts" type="number">
      </div>
      <div class="form-group">
        <label>Profile Picture</label>
        <select id="has_pic">
          <option value="1">Present</option>
          <option value="0">Not Present</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Bio</label>
      <select id="has_bio">
        <option value="1">Present</option>
        <option value="0">Not Present</option>
      </select>
    </div>

    <button onclick="checkProfile()" id="checkBtn">Check Profile</button>

    <div id="loader" class="loader hidden"></div>
    <div id="result" class="result hidden"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>

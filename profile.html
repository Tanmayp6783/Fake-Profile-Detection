<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FakeGuard — My Profile</title>
  <script>
  const savedTheme = localStorage.getItem('fg_theme');

  if (savedTheme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <link rel="stylesheet" href="profile.css"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">

  <div class="brand-left">
    <button onclick="toggleSidebar()" class="collapse-btn">☰</button>

    <div class="brand-icon">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" stroke="var(--accent)" stroke-width="2.5"/>
          <path d="M10 16.5l4 4 8-8" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">FakeGuard</span>
    </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="analyze.html" class="nav-item" data-page="analyze">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>Analyze Profile</span>
      </a>
      <a href="history.html" class="nav-item" data-page="history">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span>History</span>
      </a>
      <a href="profile.html" class="nav-item active" data-page="profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>My Profile</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="theme-toggle" onclick="toggleTheme()">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span class="theme-label"></span>
      </button>
      <button class="signout-btn" onclick="signOut()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <header class="mobile-header">
    <button class="hamburger" onclick="toggleSidebar()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="brand-name">FakeGuard</span>
    <button class="theme-toggle-mobile" onclick="toggleTheme()">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">My Profile</h1>
        <p class="page-sub">Manage your account information</p>
      </div>
    </div>

    <div class="profile-layout">
      <div class="profile-card">
        <div class="avatar-section">
          <div class="avatar-ring">
            <div class="avatar-circle" id="avatar-display">JD</div>
          </div>
          <div class="avatar-info">
            <h2 id="profile-display-name">John Doe</h2>
            <p id="profile-display-email">john@example.com</p>
          </div>
        </div>

        <div class="profile-stats-row">
          <div class="p-stat">
            <div class="p-stat-val" id="p-total">0</div>
            <div class="p-stat-label">Analyzed</div>
          </div>
          <div class="p-stat">
            <div class="p-stat-val" id="p-fake">0</div>
            <div class="p-stat-label">Fake Found</div>
          </div>
          <div class="p-stat">
            <div class="p-stat-val" id="p-real">0</div>
            <div class="p-stat-label">Real Found</div>
          </div>
        </div>
      </div>

      <div class="section-card">
        <h3 class="section-title">Account Details</h3>
        <div id="profile-success" class="form-success hidden">Profile updated successfully!</div>

        <div class="form-grid">
          <div class="field-group">
            <label>First Name</label>
            <input type="text" id="p-fname" class="field-input" placeholder="First name"/>
          </div>
          <div class="field-group">
            <label>Last Name</label>
            <input type="text" id="p-lname" class="field-input" placeholder="Last name"/>
          </div>
          <div class="field-group full">
            <label>Email Address</label>
            <input type="email" id="p-email" class="field-input" placeholder="your@email.com"/>
          </div>
          <div class="field-group full">
            <label>Institution / Organization <span class="optional">(optional)</span></label>
            <input type="text" id="p-org" class="field-input" placeholder="e.g. MIT, Google..."/>
          </div>
          <div class="field-group full">
            <label>Bio <span class="optional">(optional)</span></label>
            <textarea id="p-bio" class="field-input field-textarea" placeholder="Tell us a bit about yourself..."></textarea>
          </div>
        </div>

        <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
      </div>

      <div class="section-card danger-zone">
        <h3 class="section-title">Change Password</h3>
        <div class="form-grid">
          <div class="field-group full">
            <label>Current Password</label>
            <input type="password" id="p-cur-pass" class="field-input" placeholder="••••••••"/>
          </div>
          <div class="field-group">
            <label>New Password</label>
            <input type="password" id="p-new-pass" class="field-input" placeholder="••••••••"/>
          </div>
          <div class="field-group">
            <label>Confirm Password</label>
            <input type="password" id="p-con-pass" class="field-input" placeholder="••••••••"/>
          </div>
        </div>
        <button class="btn-outline" onclick="changePassword()">Update Password</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    loadProfile();
  </script>
</body>
</html>
